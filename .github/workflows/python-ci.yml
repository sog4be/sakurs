name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  # Fast checks that run first to fail quickly
  python-quick-checks:
    name: Python Quick Checks (Ruff & mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "sakurs-py/uv.lock"
      
      - name: Restore uv cache
        uses: actions/cache@v6
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('sakurs-py/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('sakurs-py/uv.lock') }}
            uv-${{ runner.os }}
      
      - name: Install dependencies
        run: |
          cd sakurs-py
          uv sync --extra dev --extra test --no-install-project --locked
      
      - name: Check formatting with Ruff
        run: |
          cd sakurs-py
          uv run --no-sync ruff format --check .
      
      - name: Lint with Ruff
        run: |
          cd sakurs-py
          uv run --no-sync ruff check .
      
      - name: Type check with mypy
        run: |
          cd sakurs-py
          uv run --no-sync mypy .
      
      - name: Check Rust code compilation
        run: |
          cd sakurs-py
          cargo check --all-features
      
      - name: Lint Rust code with clippy
        run: |
          cd sakurs-py
          cargo clippy --all-features -- -D warnings
      
      - name: Minimize uv cache
        run: uv cache prune --ci

  python-test:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    needs: python-quick-checks  # Only run tests if quick checks pass
    strategy:
      fail-fast: true
      matrix:
        include:
          # Exercise every supported Python on Linux. On macOS and Windows,
          # cover the minimum and maximum supported versions for the abi3 wheel.
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: ubuntu-latest
            python-version: '3.13'
          - os: ubuntu-latest
            python-version: '3.14'
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.14'
          - os: macos-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.14'
    
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "sakurs-py/uv.lock"
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.os }}-${{ matrix.python-version }}
      
      - name: Restore uv cache
        uses: actions/cache@v6
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('sakurs-py/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('sakurs-py/uv.lock') }}
            uv-${{ runner.os }}-${{ matrix.python-version }}
            uv-${{ runner.os }}
      
      - name: Install dependencies and build wheel
        run: |
          cd sakurs-py
          uv sync --extra test --no-install-project --locked
          # Build wheel instead of editable install for consistent behavior
          uv run --no-sync maturin build --release --features extension-module -o dist

      - name: Install built wheel (Unix)
        if: runner.os != 'Windows'
        run: |
          cd sakurs-py
          # Find and install the built wheel
          WHEEL_FILE=$(ls dist/*.whl | head -1)
          uv pip install --force-reinstall "$WHEEL_FILE"

      - name: Install built wheel (Windows)
        if: runner.os == 'Windows'
        run: |
          cd sakurs-py
          # Find and install the built wheel
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          uv pip install --force-reinstall $wheel.FullName
      
      - name: Run Python tests
        if: runner.os != 'Windows'
        run: |
          cd sakurs-py
          .venv/bin/python -m pytest -v --ignore=benchmarks/

      - name: Run Python tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd sakurs-py
          .venv\Scripts\python.exe -m pytest -v --ignore=benchmarks/
      
      - name: Test wheel installation (Unix)
        if: runner.os != 'Windows'
        run: |
          cd sakurs-py
          .venv/bin/python -c "import sakurs; print(sakurs.__version__)"

      - name: Test wheel installation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd sakurs-py
          .venv\Scripts\python.exe -c "import sakurs; print(sakurs.__version__)"
      
      - name: Minimize uv cache
        run: uv cache prune --ci

  # Job to verify all Python CI passed (for branch protection rules)
  python-ci-success:
    name: Python CI Success
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [python-quick-checks, python-test]
    steps:
      - name: Check if all Python CI jobs passed
        run: |
          if [[ "${{ needs.python-quick-checks.result }}" != "success" || \
                "${{ needs.python-test.result }}" != "success" ]]; then
            echo "One or more Python CI jobs failed"
            exit 1
          fi
          echo "All Python CI jobs passed successfully"
